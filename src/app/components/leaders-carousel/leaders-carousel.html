<section id="testimonials" class="testimonials py-3">

    <div id="testimonialsCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

      <!-- Indicators -->
      <div class="carousel-indicators">
        <button
          *ngFor="let item of testimonials; let i = index"
          type="button"
          data-bs-target="#testimonialsCarousel"
          [attr.data-bs-slide-to]="i"
          [class.active]="i === 0"
          [attr.aria-current]="i === 0 ? 'true' : null"
          [attr.aria-label]="'Slide ' + (i + 1)">
        </button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner">
        <div
          *ngFor="let item of testimonials; let i = index"
          class="carousel-item"
          [class.active]="i === 0">

          <div class="d-flex flex-column align-items-center text-center px-4 py-4">
            <img
              [src]="item.img"
              [alt]="item.name"
              class="testimonial-img rounded-circle mb-3">

            <h3 class="fw-bold mb-2 text-white">{{ item.name }}</h3>

            <p class="fst-italic text-light px-md-5">
              <i class="bx bxs-quote-alt-left quote-icon-left me-1"></i>
              {{ item.quote }}
              <i class="bx bxs-quote-alt-right quote-icon-right ms-1"></i>
            </p>
          </div>

        </div>
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#testimonialsCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#testimonialsCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>

    </div>
</section>
